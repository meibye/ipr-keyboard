  <path d="M50 27l8 6-8 6" fill="none" stroke="#90a4ae" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Raspberry Pi -->
  <rect x="61" y="18" width="34" height="24" rx="5" fill="#c62828"/>
