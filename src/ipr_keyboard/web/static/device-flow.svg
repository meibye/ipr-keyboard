  <path d="M122 27l8 6-8 6" fill="none" stroke="#90a4ae" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PC -->
  <rect x="135" y="16" width="40" height="26" rx="3" fill="#37474f"/>
  <rect x="138" y="19" width="34" height="20" rx="2" fill="#546e7a"/>
