<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Configuration - IPR Keyboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ipr.css') }}">
</head>
<body class="legacy-page">
    <h1>Configuration</h1>
    <a href="/">&larr; Back to Home</a>
    <div class="section">
        <form method="post">
            <table>
                <tr><th>Parameter</th><th>Value</th></tr>
                {% for key, value in config.items() %}
                <tr>
                    <td>{{ key }}</td>
                    <td>
                        {% if value is boolean %}
                            <input type="checkbox" name="{{ key }}" {% if value %}checked{% endif %} />
                        {% elif value is number %}
                            <input type="number" name="{{ key }}" value="{{ value }}" />
                        {% else %}
                            <input type="text" name="{{ key }}" value="{{ value }}" />
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </table>
            <button class="btn" type="submit">Save All</button>
        </form>
    </div>
    <div class="section">
        <form method="post" style="display:inline;">
            <button class="btn fail" type="submit" name="restart" value="1">Restart Machine</button>
        </form>
        <form method="post" style="display:inline; margin-left:1em;">
            <button class="btn fail" type="submit" name="shutdown" value="1">Shutdown Machine</button>
        </form>
    </div>
    {% if result %}
        <div class="ok">{{ result }}</div>
    {% endif %}
    {% if error %}
        <div class="fail">{{ error }}</div>
    {% endif %}
</body>
</html>
