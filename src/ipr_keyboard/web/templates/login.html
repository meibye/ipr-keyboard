<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in – IPR Pen Bridge</title>
<style>
  :root {
    --color-bg: #f5f6fa;
    --color-surface: #ffffff;
    --color-border: #dfe4ea;
    --color-text: #2c3e50;
    --color-text-muted: #7f8c8d;
    --color-primary: #2980b9;
    --color-error: #e74c3c;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 32px;
    width: 100%;
    max-width: 360px;
  }

  .login-brand {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-muted);
    margin-bottom: 6px;
  }

  .login-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--color-text);
    margin-bottom: 24px;
  }

  .login-error {
    background: #fadbd8;
    color: var(--color-error);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 18px;
  }

  .field-group {
    margin-bottom: 16px;
  }

  .field-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text-muted);
    margin-bottom: 6px;
  }

  .field-group input[type="text"],
  .field-group input[type="password"] {
    width: 100%;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--color-text);
    background: var(--color-surface);
    transition: border-color 0.15s;
    outline: none;
  }

  .field-group input:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(41,128,185,0.12);
  }

  .password-wrap {
    position: relative;
  }

  .password-wrap input {
    padding-right: 44px;
  }

  .pw-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--color-text-muted); font-size: 18px; line-height: 1;
    padding: 4px;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: var(--color-primary); }

  .remember-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 20px; margin-top: -4px;
  }
  .remember-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
  .remember-row label {
    font-size: 13px; color: var(--color-text-muted); cursor: pointer;
  }

  .btn-login {
    width: 100%;
    padding: 12px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-login:hover { opacity: 0.88; }
  .btn-login:active { opacity: 0.75; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-brand">IPR Pen Bridge</div>
  <h1 class="login-title">Sign in</h1>

  {% if error %}
  <div class="login-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') | urlencode }}{% endif %}" id="login-form">
    <div class="field-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             autocomplete="username" autofocus required
             value="{{ request.form.get('username', '') }}">
    </div>
    <div class="field-group">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password"
               autocomplete="current-password" required>
        <button type="button" class="pw-toggle" id="pw-toggle" title="Show/hide password" aria-label="Show/hide password">
          👁
        </button>
      </div>
    </div>
    <div class="remember-row">
      <input type="checkbox" id="remember-me" name="remember_me">
      <label for="remember-me">Remember username</label>
    </div>
    <button type="submit" class="btn-login">Sign in</button>
  </form>
</div>

<script>
(function () {
  var STORAGE_KEY = 'ipr_remembered_username';

  // Restore remembered username
  var stored = localStorage.getItem(STORAGE_KEY);
  var usernameField = document.getElementById('username');
  var rememberBox = document.getElementById('remember-me');

  if (stored && !usernameField.value) {
    usernameField.value = stored;
    rememberBox.checked = true;
  }

  // Save/clear on submit
  document.getElementById('login-form').addEventListener('submit', function () {
    if (rememberBox.checked) {
      localStorage.setItem(STORAGE_KEY, usernameField.value);
    } else {
      localStorage.removeItem(STORAGE_KEY);
    }
  });

  // Password visibility toggle
  var pwInput = document.getElementById('password');
  document.getElementById('pw-toggle').addEventListener('click', function () {
    if (pwInput.type === 'password') {
      pwInput.type = 'text';
      this.textContent = '🙈';
    } else {
      pwInput.type = 'password';
      this.textContent = '👁';
    }
  });
})();
</script>
</body>
</html>
