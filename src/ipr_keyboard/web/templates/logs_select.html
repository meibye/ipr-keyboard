<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - IPR Pen Bridge</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='ipr.css') }}">
</head>
<body>
  <a href="/" class="back-link">← Back to Dashboard</a>
  <h1>Logs</h1>

  <div class="card">
    <div class="section-label">Select log source(s)</div>
    <form method="get">
      <div class="checkbox-grid">
        {% for unit in units %}
          <label>
            <input type="checkbox" name="unit" value="{{ unit }}"
                   {% if unit in selected_units %}checked{% endif %}>
            <span title="{{ unit }}">{{ unit }}</span>
          </label>
        {% endfor %}
      </div>
      <button type="submit" class="submit-btn">Show Logs</button>
    </form>
  </div>

  <div class="log-card">
    <div class="log-card-header">Log output</div>
    <pre class="log-content">{{ log_content }}</pre>
  </div>
</body>
</html>
