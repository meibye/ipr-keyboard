<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - IPR Pen Bridge</title>
  <style>
    :root {
      --color-bg: #f5f6fa;
      --color-surface: #ffffff;
      --color-border: #dfe4ea;
      --color-text: #2c3e50;
      --color-text-muted: #7f8c8d;
      --color-primary: #2980b9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      padding: 16px;
      min-height: 100vh;
    }
    .back-link {
      display: inline-block; margin-bottom: 14px;
      font-size: 14px; color: var(--color-primary); text-decoration: none;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 14px; }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .section-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--color-text-muted); margin-bottom: 10px;
    }
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px 16px;
      margin-bottom: 14px;
    }
    @media (min-width: 480px) {
      .checkbox-grid { grid-template-columns: 1fr 1fr; }
    }
    .checkbox-grid label {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; cursor: pointer; padding: 6px 0;
      min-width: 0;
    }
    .checkbox-grid label span {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .checkbox-grid input[type="checkbox"] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }
    .submit-btn {
      padding: 10px 22px; border-radius: 8px;
      background: var(--color-primary); color: #fff;
      border: none; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .submit-btn:hover { opacity: 0.88; }

    .log-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 10px; overflow: hidden; }
    .log-card-header {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--color-text-muted);
      padding: 10px 16px; border-bottom: 1px solid var(--color-border);
    }
    .log-content {
      display: block;
      background: #1e272e; color: #dfe6e9;
      font-family: monospace; font-size: 12px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-all;
      padding: 12px 14px;
      overflow-y: auto;
      max-height: 60vh;
      min-height: 120px;
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">← Back to Dashboard</a>
  <h1>Logs</h1>

  <div class="card">
    <div class="section-label">Select log source(s)</div>
    <form method="get">
      <div class="checkbox-grid">
        {% for unit in units %}
          <label>
            <input type="checkbox" name="unit" value="{{ unit }}"
                   {% if unit in selected_units %}checked{% endif %}>
            <span title="{{ unit }}">{{ unit }}</span>
          </label>
        {% endfor %}
      </div>
      <button type="submit" class="submit-btn">Show Logs</button>
    </form>
  </div>

  <div class="log-card">
    <div class="log-card-header">Log output</div>
    <pre class="log-content">{{ log_content }}</pre>
  </div>
</body>
</html>
