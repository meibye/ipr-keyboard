<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bluetooth Pairing Wizard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        h1 { color: #2c3e50; }
        .section { margin-bottom: 2em; }
        pre { background: #f8f8f8; padding: 1em; border-radius: 4px; }
        .btn { background: #2980b9; color: #fff; border: none; padding: 0.5em 1.2em; border-radius: 4px; cursor: pointer; font-size: 1em; }
        .btn:disabled { background: #aaa; }
        .result { margin-top: 1em; color: #27ae60; }
        .error { color: #c0392b; }
    </style>
</head>
<body>
    <h1>Bluetooth Pairing Wizard</h1>
    <a href="/">&larr; Back to Home</a>
    <div class="section">
        <form method="post">
            <button class="btn" type="submit">Start Pairing</button>
        </form>
        {% if result %}
            <div class="result">{{ result }}</div>
        {% endif %}
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
    <div class="section">
        <h2>Paired Devices</h2>
        {% for dev in devices %}
            <div style="margin-bottom:1em;">
                <strong>MAC:</strong> {{ dev.mac if dev.mac else '' }}<br>
                <pre>{{ dev.info if dev.info else dev.error }}</pre>
            </div>
        {% else %}
            <em>No paired devices found.</em>
        {% endfor %}
    </div>
</body>
</html>
