<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bluetooth Pairing Wizard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ipr.css') }}">
</head>
<body class="legacy-page">
    <h1>Bluetooth Pairing Wizard</h1>
    <a href="/">&larr; Back to Home</a>
    <div class="section">
        <form method="post">
            <button class="btn" type="submit">Start Pairing</button>
        </form>
        {% if result %}
            <div class="result">{{ result }}</div>
        {% endif %}
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
    <div class="section">
        <h2>Paired Devices</h2>
        {% for dev in devices %}
            <div style="margin-bottom:1em;">
                <strong>MAC:</strong> {{ dev.mac if dev.mac else '' }}<br>
                <pre>{{ dev.info if dev.info else dev.error }}</pre>
            </div>
        {% else %}
            <em>No paired devices found.</em>
        {% endfor %}
    </div>
</body>
</html>
