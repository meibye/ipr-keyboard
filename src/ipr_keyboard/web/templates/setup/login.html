<!doctype html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<title>{{ t['login_title'] }} – IPR Keyboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/setup.css">
<style>
.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1rem;
}
.login-card {
  background: white;
  border-radius: 14px;
  padding: 2rem 1.6rem;
  box-shadow: 0 4px 18px rgba(0,0,0,.12);
  width: 100%;
  max-width: 360px;
}
.login-brand {
  font-size: 1rem;
  font-weight: 700;
  color: #764ba2;
  margin-bottom: .3rem;
}
.login-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: #1a1a2e;
  margin: 0 0 1.4rem;
}
.login-error {
  background: #fef2f2;
  color: #c0392b;
  border: 1px solid #f5c6cb;
  border-radius: 8px;
  padding: .7rem .9rem;
  font-size: .9rem;
  margin-bottom: 1.1rem;
}
.field-group { margin-bottom: 1rem; }
.field-group label {
  display: block;
  font-size: .85rem;
  font-weight: 600;
  color: #444;
  margin-bottom: .35rem;
}
.field-group input {
  width: 100%;
  padding: .65rem .8rem;
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  font-size: 1rem;
  color: #1a1a2e;
  background: #fafafa;
  box-sizing: border-box;
  transition: border-color .15s;
}
.field-group input:focus {
  outline: none;
  border-color: #667eea;
  background: white;
}
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 2.8rem; }
.pw-toggle {
  position: absolute;
  right: .6rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0;
  line-height: 1;
}
.btn-login {
  width: 100%;
  padding: .75rem;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: .4rem;
}
.btn-login:active { opacity: .9; }
.login-hint {
  font-size: .8rem;
  color: #999;
  text-align: center;
  margin-top: 1rem;
  white-space: pre-line;
}
.login-lang {
  text-align: right;
  font-size: .8rem;
  margin-bottom: .8rem;
}
.login-lang a {
  color: #888;
  text-decoration: none;
  padding: .2rem .4rem;
  border-radius: 4px;
}
.login-lang a.active {
  background: #f0eaff;
  color: #764ba2;
  font-weight: 700;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-lang">
      <a href="{{ url_for('setup.set_lang', code='en') }}"
         class="{% if lang=='en' %}active{% endif %}">EN</a>
      <a href="{{ url_for('setup.set_lang', code='da') }}"
         class="{% if lang=='da' %}active{% endif %}">DA</a>
    </div>

    <div class="login-brand">{{ t['login_brand'] }}</div>
    <h1 class="login-title">{{ t['login_title'] }}</h1>

    {% if error %}
    <div class="login-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="POST"
          action="{{ url_for('setup.login_submit') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}"
          autocomplete="on">
      <div class="field-group">
        <label for="setup-username">{{ t['login_username_label'] }}</label>
        <input type="text" id="setup-username" name="username"
               autocomplete="username"
               value="ipr"
               readonly
               required>
      </div>
      <div class="field-group">
        <label for="setup-password">{{ t['login_password_label'] }}</label>
        <div class="pw-wrap">
          <input type="password" id="setup-password" name="password"
                 autocomplete="current-password"
                 autofocus required>
          <button type="button" class="pw-toggle" id="pw-toggle"
                  aria-label="{{ t['login_toggle_pw'] }}">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-login">{{ t['login_submit'] }}</button>
    </form>

    <p class="login-hint">{{ t['login_hint'] }}</p>
  </div>
</div>

<script>
(function () {
  var pw = document.getElementById('setup-password');
  document.getElementById('pw-toggle').addEventListener('click', function () {
    if (pw.type === 'password') { pw.type = 'text'; this.textContent = '🙈'; }
    else                        { pw.type = 'password'; this.textContent = '👁'; }
  });
})();
</script>
</body>
</html>
