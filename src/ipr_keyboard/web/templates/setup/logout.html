<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signed out – IPR Keyboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/setup.css">
<style>
  .logout-card {
    background: white;
    border-radius: 12px;
    padding: 2rem 1.4rem;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    text-align: center;
    max-width: 400px;
    margin: 3rem auto;
  }
  .logout-card h2 { margin: 0 0 .6rem; color: #333; }
  .logout-card p  { color: #666; font-size: .92rem; margin: .4rem 0 1.4rem; }
  .btn { display: inline-block; padding: .6rem 1.4rem; border-radius: 8px;
         background: #667eea; color: white; text-decoration: none;
         font-size: .95rem; font-weight: 600; }
</style>
</head>
<body style="background:#f0f2f5;min-height:100vh">
<nav style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:.7rem 1.2rem">
  <span style="color:white;font-weight:700">IPR Keyboard</span>
</nav>
<div class="logout-card">
  <h2>Signed out</h2>
  <p>Your session credentials have been cleared.</p>
  <p style="font-size:.83rem;color:#999">
    On some browsers, close this tab to fully remove the saved password.
  </p>
  <a href="/setup/" class="btn">Sign in again</a>
</div>
</body>
</html>
