{% extends "setup/base.html" %}
{% block content %}
<div class="card">
  <h2>Log Viewer</h2>
  <form method="get" action="{{ url_for('setup.logs') }}">
    <div class="unit-list">
      {% for unit in all_units %}
      <label>
        <input type="checkbox" name="unit" value="{{ unit }}"
               {% if unit in selected_units %}checked{% endif %}>
        {{ unit }}
      </label>
      {% endfor %}
    </div>
    <button type="submit" class="btn btn-secondary btn-sm"
            style="display:inline-block;margin:.5rem 0">Refresh</button>
  </form>
  <pre>{{ log_content }}</pre>
</div>
{% endblock %}
