{% extends "setup/base.html" %}
{% block content %}
<div class="card">
  <h2>{{ t['wifi_title'] }}</h2>
  <p style="color:#666;font-size:.88rem;margin-top:0">
    {{ t['wifi_desc'] }}
  </p>
  <form method="post" action="{{ url_for('setup.connect') }}">
    <label>{{ t['wifi_network'] }}</label>
    <select name="ssid" required>
      {% for ssid in ssids %}
      <option value="{{ ssid }}">{{ ssid }}</option>
      {% endfor %}
    </select>
    <label>{{ t['wifi_security'] }}</label>
    <select name="security">
      <option value="auto">{{ t['wifi_sec_auto'] }}</option>
      <option value="open">{{ t['wifi_sec_open'] }}</option>
    </select>
    <label>{{ t['wifi_password'] }}</label>
    <div class="pw-row">
      <input id="psk" name="psk" type="password"
             placeholder="{{ t['wifi_placeholder'] }}" autocomplete="new-password">
      <button type="button" class="btn btn-secondary btn-sm"
        onclick="var f=document.getElementById('psk');f.type=f.type==='password'?'text':'password'">{{ t['wifi_show'] }}</button>
    </div>
    <button type="submit" class="btn btn-primary" style="margin-top:.8rem">
      {{ t['wifi_save'] }}
    </button>
  </form>
</div>

<div class="card">
  <form method="post" action="{{ url_for('setup.rescan') }}">
    <button type="submit" class="btn btn-secondary">{{ t['wifi_rescan'] }}</button>
  </form>
</div>
{% endblock %}
